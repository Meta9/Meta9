<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZTE 解锁密码计算器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #e8f0ff 0%, #f7f7fa 100%);
            font-family: "Microsoft YaHei", "Segoe UI", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: #ffffff;
            width: 100%;
            max-width: 360px;
            padding: 36px 28px;
            border-radius: 18px;
            box-shadow: 0 8px 30px rgba(45, 124, 247, 0.12);
            transition: all 0.3s ease;
        }
        .card:hover {
            box-shadow: 0 12px 40px rgba(45, 124, 247, 0.18);
        }
        h2 {
            text-align: center;
            color: #2d7cf7;
            font-size: 24px;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }
        .desc-tip {
            font-size: 14px;
            color: #666;
            line-height: 1.6;
            text-align: center;
            margin-bottom: 24px;
        }
        .desc-tip b {
            color: #2d7cf7;
        }
        .input-box label {
            display: block;
            font-size: 15px;
            color: #333;
            margin-bottom: 8px;
            font-weight: 500;
        }
        #imei {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #dde3ee;
            border-radius: 10px;
            font-size: 18px;
            transition: 0.25s;
            outline: none;
        }
        #imei:focus {
            border-color: #2d7cf7;
            box-shadow: 0 0 0 3px rgba(45, 124, 247, 0.15);
        }
        .btn-calc {
            width: 100%;
            margin-top: 20px;
            padding: 13px 0;
            border: none;
            border-radius: 10px;
            font-size: 17px;
            font-weight: 500;
            color: #fff;
            background: linear-gradient(90deg, #2d7cf7, #0060e6);
            cursor: pointer;
            transition: all 0.25s ease;
        }
        .btn-calc:hover {
            background: linear-gradient(90deg, #1868e0, #004fc4);
            transform: translateY(-2px);
        }
        .btn-calc:active {
            transform: translateY(0);
        }
        .result-wrap {
            margin-top: 24px;
            padding: 14px;
            background: #f0f9ff;
            border-radius: 10px;
            text-align: center;
            display: none;
        }
        .result-text {
            font-size: 20px;
            font-weight: bold;
            color: #0f8538;
            letter-spacing: 2px;
            cursor: pointer;
            user-select: none;
            padding: 6px;
            border-radius: 8px;
            transition: background 0.2s;
        }
        .result-text:active {
            background: #d7ecff;
        }
        .copy-tip {
            margin-top: 8px;
            font-size: 13px;
            color: #6699cc;
        }
        .error-text {
            margin-top: 12px;
            text-align: center;
            font-size: 15px;
            color: #d32f2f;
            height: 22px;
        }
        /* 隐藏复制用临时输入框 */
        #copyTemp {
            position: fixed;
            left: -9999px;
            opacity: 0;
        }
        /* 轻提示弹窗 */
        .toast {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.75);
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 999;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>ZTE 解锁密码计算器</h2>
        <div class="desc-tip">请输入设备 IMEI 的最后 <b>6 位数字</b>，点击计算获取解锁密码</div>

        <div class="input-box">
            <label for="imei">IMEI 末尾6位</label>
            <input type="text" id="imei" maxlength="6" placeholder="示例：123456">
        </div>

        <button class="btn-calc" onclick="calcPassword()">一键计算密码</button>

        <div class="error-text" id="error"></div>

        <div class="result-wrap" id="resultWrap">
            <div class="result-text" id="result" onclick="autoCopy()"></div>
            <div class="copy-tip">点击上方密码文字一键复制</div>
        </div>
    </div>

    <!-- 复制临时容器 -->
    <input id="copyTemp" readonly>
    <!-- 复制成功提示 -->
    <div class="toast" id="toast">复制成功</div>

    <script>
        let currentPwd = '';
        const toast = document.getElementById('toast');

        // 中兴密码计算算法
        function zteUnlockPassword(imeiLast6) {
            const weights = [2, 3, 4, 5, 6, 7];
            let passwordChars = Array(6).fill('');
            for (let i = 5; i >= 0; i--) {
                let digit = parseInt(imeiLast6[5 - i], 10);
                let weight = weights[5 - i];
                let remainder = (digit * weight) % 10;
                passwordChars[i] = remainder.toString();
            }
            return passwordChars.join('');
        }

        // 计算密码
        function calcPassword() {
            const input = document.getElementById('imei');
            const resultWrap = document.getElementById('resultWrap');
            const resultText = document.getElementById('result');
            const errorBox = document.getElementById('error');
            let val = input.value.trim();

            resultWrap.style.display = 'none';
            errorBox.innerText = '';

            if (!/^\d{6}$/.test(val)) {
                errorBox.innerText = '请输入6位纯数字IMEI尾号';
                input.focus();
                return;
            }

            currentPwd = zteUnlockPassword(val);
            resultText.innerText = `解锁密码：${currentPwd}`;
            resultWrap.style.display = 'block';
        }

        // 点击密码自动复制（电脑+手机双兼容）
        function autoCopy() {
            const temp = document.getElementById('copyTemp');
            temp.value = currentPwd;
            temp.select();
            temp.setSelectionRange(0, temp.value.length);

            let copySuccess = false;
            // 方案1：传统复制（本地HTML优先）
            try {
                if (document.execCommand('copy')) copySuccess = true;
            } catch(e) {}

            // 方案2：现代Clipboard API兜底
            if (!copySuccess) {
                navigator.clipboard.writeText(currentPwd)
                    .then(() => copySuccess = true)
                    .catch(() => {});
            }

            // 弹出轻提示
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 1200);
        }

        // 回车快速计算
        document.getElementById('imei').addEventListener('keydown', e => {
            if (e.key === 'Enter') calcPassword();
        })
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 移动端自适应核心配置 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GitHub Join Date Checker</title>
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }

        :root {
            /* 主题配色 - 清新蓝白主题，跨端视觉舒适 */
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --text-main: #1f2937;
            --text-secondary: #6b7280;
            --text-danger: #ef4444;
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.08);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-page);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px 15px;
            color: var(--text-main);
            position: relative;
        }

        /* 语言切换按钮 - 自适应定位 */
        .lang-switch {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            padding: 6px 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }
        .lang-switch:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        /* 主容器 - 自适应宽度 */
        .container {
            width: 100%;
            max-width: 460px;
            text-align: center;
        }

        h1 {
            font-size: clamp(22px, 5vw, 28px);
            margin-bottom: 28px;
            font-weight: 700;
        }
        h1 span {
            color: var(--primary);
        }

        /* 搜索栏 - 移动端自动竖排 */
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .search-box {
                flex-direction: column;
            }
        }

        .search-box input {
            flex: 1;
            padding: 14px 16px;
            border: 1px solid var(--border);
            border-radius: 10px;
            background: var(--bg-card);
            color: var(--text-main);
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box button {
            padding: 14px 24px;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .search-box button:hover:not(:disabled) {
            background: var(--primary-light);
        }
        .search-box button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* 提示文案 */
        .error-msg {
            color: var(--text-danger);
            font-size: 14px;
            margin-bottom: 12px;
            display: none;
        }
        .loading {
            display: none;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-size: 14px;
        }

        /* 结果卡片 - 圆角阴影，自适应 */
        .result-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 32px 20px;
            box-shadow: var(--shadow);
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-icon {
            font-size: 52px;
            margin-bottom: 18px;
        }

        .result-date {
            font-size: clamp(18px, 4vw, 22px);
            font-weight: 600;
            margin-bottom: 12px;
        }

        .result-duration {
            font-size: 15px;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        .result-duration strong {
            color: var(--text-main);
            font-weight: 600;
        }
    </style>
</head>
<body>
    <button class="lang-switch" onclick="toggleLang()">EN / 中</button>

    <div class="container">
        <h1 id="mainTitle">GitHub <span>注册时间</span>查询</h1>

        <div class="search-box">
            <input type="text" id="username" placeholder="输入 GitHub 用户名" autofocus>
            <button onclick="check()" id="btnSearch">查询</button>
        </div>

        <div id="error" class="error-msg"></div>
        <div id="loading" class="loading">正在查询...</div>

        <div id="card" class="result-card">
            <div class="result-icon">🎂</div>
            <div class="result-date" id="joinDate"></div>
            <div class="result-duration" id="joinDuration"></div>
        </div>
    </div>

    <script>
        // 语言配置
        const i18n = {
            zh: {
                title: 'GitHub <span>注册时间</span>查询',
                placeholder: '输入 GitHub 用户名',
                btnSearch: '查询',
                loading: '正在查询...',
                errorEmpty: '请输入用户名',
                error404: '用户不存在',
                error403: '请求过于频繁，请稍后再试',
                errorNet: '网络错误，请检查连接',
                durationLabel: '已注册：',
                daysTotal: '总计',
                dayUnit: '天',
                yearUnit: '年',
                monthUnit: '个月',
                dayUnitShort: '天'
            },
            en: {
                title: 'GitHub <span>Join Date</span> Checker',
                placeholder: 'Enter GitHub Username',
                btnSearch: 'Check',
                loading: 'Loading...',
                errorEmpty: 'Please enter a username',
                error404: 'User not found',
                error403: 'Rate limit exceeded. Please try again later.',
                errorNet: 'Network error. Please check connection.',
                durationLabel: 'Joined: ',
                daysTotal: 'Total',
                dayUnit: 'days',
                yearUnit: 'years',
                monthUnit: 'months',
                dayUnitShort: 'days'
            }
        };

        let currentLang = 'zh';
        const usernameInput = document.getElementById('username');
        const btnSearch = document.getElementById('btnSearch');
        const errEl = document.getElementById('error');
        const loadEl = document.getElementById('loading');
        const cardEl = document.getElementById('card');
        const joinDateEl = document.getElementById('joinDate');
        const joinDurationEl = document.getElementById('joinDuration');

        // 切换语言
        function toggleLang() {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            updateUI();
        }

        // 更新界面文本
        function updateUI() {
            const t = i18n[currentLang];
            document.getElementById('mainTitle').innerHTML = t.title;
            usernameInput.placeholder = t.placeholder;
            btnSearch.innerText = t.btnSearch;
            loadEl.innerText = t.loading;
            errEl.style.display = 'none';
        }

        // 回车查询
        usernameInput.addEventListener('keydown', e => {
            if (e.key === 'Enter') check();
        });

        // 查询核心逻辑
        async function check() {
            const user = usernameInput.value.trim();
            const t = i18n[currentLang];

            errEl.style.display = 'none';
            cardEl.style.display = 'none';

            if (!user) {
                errEl.textContent = t.errorEmpty;
                errEl.style.display = 'block';
                return;
            }

            loadEl.style.display = 'block';
            btnSearch.disabled = true;

            try {
                const res = await fetch(`https://api.github.com/users/${encodeURIComponent(user)}`);
                if (res.status === 404) throw new Error('404');
                if (res.status === 403) throw new Error('403');
                if (!res.ok) throw new Error('net');

                const data = await res.json();
                renderTime(data.created_at);
            } catch (e) {
                if (e.message === '404') {
                    errEl.textContent = t.error404;
                } else if (e.message === '403') {
                    errEl.textContent = t.error403;
                } else {
                    errEl.textContent = t.errorNet;
                }
                errEl.style.display = 'block';
            } finally {
                loadEl.style.display = 'none';
                btnSearch.disabled = false;
            }
        }

        // 时间格式化渲染
        function renderTime(dateStr) {
            const t = i18n[currentLang];
            const created = new Date(dateStr);
            const now = new Date();

            const diffTime = Math.abs(now - created);
            const totalDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

            let years = now.getFullYear() - created.getFullYear();
            let months = now.getMonth() - created.getMonth();
            let days = now.getDate() - created.getDate();

            if (days < 0) {
                months--;
                const lastMonth = new Date(now.getFullYear(), now.getMonth(), 0);
                days += lastMonth.getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            let dateFormatted;
            if (currentLang === 'zh') {
                dateFormatted = `${created.getFullYear()} 年 ${created.getMonth() + 1} 月 ${created.getDate()} 日`;
            } else {
                const options = { year: 'numeric', month: 'long', day: 'numeric' };
                dateFormatted = created.toLocaleDateString('en-US', options);
            }

            let durationText = '';
            if (years > 0) durationText += `${years} ${t.yearUnit} `;
            if (months > 0) durationText += `${months} ${t.monthUnit} `;
            durationText += `${days} ${t.dayUnitShort}`;

            joinDateEl.textContent = dateFormatted;
            joinDurationEl.innerHTML = 
                `${t.durationLabel}<strong>${durationText.trim()}</strong><br>(${t.daysTotal} ${totalDays.toLocaleString()} ${t.dayUnit})`;
            
            cardEl.style.display = 'block';
        }
    </script>
</body>
</html>
